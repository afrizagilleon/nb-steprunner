name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      # Guard: the committed dist/ must match a fresh build of src/.
      # If this fails, run `bun run build` locally and commit dist/.
      - name: Verify dist is up to date
        run: |
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ is stale — run 'bun run build' and commit the result."
            git --no-pager diff -- dist/
            exit 1
          fi

      - name: Upload userscript artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nb-steprunner-userscript
          path: dist/nb-steprunner.user.js
