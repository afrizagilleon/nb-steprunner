name: Release

# Trigger by pushing a tag, e.g. `git tag v0.7.0 && git push origin v0.7.0`.
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/nb-steprunner.user.js
          generate_release_notes: true
          body: |
            ## Install

            **Direct** — download `nb-steprunner.user.js` below and install in Tampermonkey
            (then change `@match` to your target site).

            **Via @require (pinned, immutable)** — in your own wrapper userscript:
            ```
            // @require https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/dist/nb-steprunner.user.js
            ```
